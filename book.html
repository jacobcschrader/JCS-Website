<style>
/* ============ Booking wizard — full-screen, Guthrie-style ============ */
body { background: var(--paper-warm); }

.fw-top { position: sticky; top: 0; z-index: 40; background: var(--paper-warm); }
.fw-bar { display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem clamp(1.25rem, 4vw, 2.5rem); border-bottom: 1px solid var(--line-soft); }
.fw-brand { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 1.45rem;
  color: var(--navy); letter-spacing: 0.04em; }
.fw-exit { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600;
  color: var(--muted); transition: color 0.25s var(--ease); }
.fw-exit:hover { color: var(--navy); }
.fw-progress { height: 2px; background: var(--line-soft); margin: 0 clamp(1.25rem, 4vw, 2.5rem); }
.fw-progress i { display: block; height: 2px; background: var(--navy); width: 0;
  transition: width 0.5s var(--ease); }

.fw-wrap { max-width: 660px; margin: 0 auto; padding: clamp(2.2rem, 5vh, 3.6rem) clamp(1.25rem, 5vw, 2rem) 9rem; }
.fw-eyebrow { text-align: center; font-size: 0.62rem; letter-spacing: 0.26em; text-transform: uppercase;
  font-weight: 600; color: var(--accent); margin-bottom: 1.1rem; }
.fw-h { font-family: var(--serif); font-weight: 400; text-align: center; color: var(--navy);
  font-size: clamp(2.1rem, 5.4vw, 2.9rem); line-height: 1.05; margin: 0 0 1rem; }
.fw-sub { text-align: center; font-family: var(--serif); font-size: 1.12rem; line-height: 1.55;
  color: var(--muted); max-width: 42ch; margin: 0 auto 2.4rem; }
.fw-microcopy { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 2rem; }
.fw-microcopy a { color: var(--navy); text-decoration: underline; text-underline-offset: 3px; }

.fw-label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
  color: var(--ink); margin: 1.6rem 0 0.55rem; }
.fw-hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.45rem; line-height: 1.55; }
.fw-note { font-size: 0.82rem; color: var(--muted); line-height: 1.65; margin-top: 1.6rem;
  padding-top: 1.2rem; border-top: 1px solid var(--line-soft); }

.fw-input, .fw-field input, .fw-field textarea {
  width: 100%; box-sizing: border-box; font-family: var(--sans); font-size: 1rem; color: var(--ink);
  background: #fff; border: 1px solid var(--line); border-radius: 3px; padding: 0.85rem 0.95rem;
  outline: none; transition: border-color 0.3s var(--ease); }
.fw-input:focus, .fw-field input:focus, .fw-field textarea:focus { border-color: var(--navy); }
.fw-sqft { text-align: center; font-size: 1.15rem; max-width: 240px; margin: 0 auto; display: block; }
.fw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
.fw-grid .full { grid-column: 1 / -1; }
@media (max-width: 560px) { .fw-grid { grid-template-columns: 1fr; } }
.fw-field label { display: block; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  font-weight: 600; color: var(--muted); margin-bottom: 0.45rem; }

/* Service cards */
.fw-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-top: 1.6rem; }
@media (max-width: 560px) { .fw-cards { grid-template-columns: 1fr; } }
.fw-card { position: relative; text-align: left; background: #fff; border: 1px solid var(--line);
  border-radius: 4px; padding: 1.15rem 1.2rem 1.05rem; cursor: pointer; font-family: var(--sans);
  transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease); }
.fw-card:hover { border-color: var(--navy-soft); }
.fw-card.on { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy); }
.fw-card .tick { position: absolute; top: 0.9rem; right: 0.9rem; width: 19px; height: 19px;
  border: 1px solid var(--line); border-radius: 4px; background: #fff; display: flex;
  align-items: center; justify-content: center; color: transparent; font-size: 0.7rem; }
.fw-card.on .tick { background: var(--navy); border-color: var(--navy); color: #fff; }
.fw-card b { display: block; font-family: var(--serif); font-weight: 500; font-size: 1.18rem;
  color: var(--navy); margin: 0 1.6rem 0.3rem 0; }
.fw-card p { font-size: 0.8rem; color: var(--muted); line-height: 1.55; margin: 0 0 0.7rem; }
.fw-card .pr { font-family: var(--serif); font-size: 1rem; color: var(--navy); }
.fw-card .pr small { font-family: var(--sans); font-size: 0.62rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); }

/* Add-on rows */
.fw-adds { display: grid; gap: 0.55rem; margin-top: 0.9rem; }
.fw-add { display: flex; align-items: center; gap: 0.8rem; background: #fff; border: 1px solid var(--line);
  border-radius: 4px; padding: 0.85rem 1rem; cursor: pointer; font-family: var(--sans); text-align: left;
  transition: border-color 0.25s var(--ease); }
.fw-add:hover { border-color: var(--navy-soft); }
.fw-add.on { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy); }
.fw-add .tick { flex: none; width: 17px; height: 17px; border: 1px solid var(--line); border-radius: 4px;
  background: #fff; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 0.62rem; }
.fw-add.on .tick { background: var(--navy); border-color: var(--navy); color: #fff; }
.fw-add span { font-size: 0.9rem; color: var(--ink); }
.fw-add .apr { margin-left: auto; font-family: var(--serif); color: var(--navy); font-size: 0.95rem; white-space: nowrap; }

/* Segmented choices */
.fw-seg { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.fw-seg button { font-family: var(--sans); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
  font-weight: 500; color: var(--ink); background: #fff; border: 1px solid var(--line); border-radius: 3px;
  padding: 0.65rem 1rem; cursor: pointer; transition: all 0.2s var(--ease); }
.fw-seg button:hover { border-color: var(--navy-soft); }
.fw-seg button.on { background: var(--navy); border-color: var(--navy); color: #fff; }

/* Review summary */
.fw-summary { background: #fff; border: 1px solid var(--line); border-radius: 4px; padding: 1.4rem 1.5rem; margin-top: 2rem; }
.fw-summary h3 { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
  color: var(--muted); font-family: var(--sans); margin: 0 0 0.9rem; }
.fw-sumrow { display: flex; justify-content: space-between; gap: 1.5rem; padding: 0.55rem 0;
  border-top: 1px solid var(--line-soft); font-size: 0.88rem; }
.fw-sumrow b { font-weight: 500; color: var(--muted); font-size: 0.72rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding-top: 0.1rem; white-space: nowrap; }
.fw-sumrow span { text-align: right; color: var(--ink); }
.fw-sumrow.total { border-top: 1px solid var(--line); margin-top: 0.4rem; padding-top: 0.9rem; }
.fw-sumrow.total span { font-family: var(--serif); font-size: 1.3rem; color: var(--navy); }

/* Agreement */
.fw-terms { background: #fff; border: 1px solid var(--line); border-radius: 4px;
  padding: 1.4rem 1.5rem; max-height: 340px; overflow-y: auto; margin-top: 1.4rem; }
.fw-terms h4 { font-family: var(--sans); font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--navy); margin: 1.3rem 0 0.4rem; }
.fw-terms h4:first-child { margin-top: 0; }
.fw-terms p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; margin: 0 0 0.6rem; }
.fw-sign { margin-top: 1.4rem; }
.fw-sign input { font-family: var(--serif); font-style: italic; font-size: 1.3rem; }
.fw-signnote { font-size: 0.75rem; color: var(--muted); margin-top: 0.7rem; line-height: 1.6; }

/* Sticky footer bar */
.fw-foot { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40; background: rgba(246,244,239,0.96);
  backdrop-filter: blur(6px); border-top: 1px solid var(--line); }
.fw-foot__in { max-width: 980px; margin: 0 auto; display: flex; align-items: center; gap: 1.2rem;
  padding: 0.9rem clamp(1.25rem, 4vw, 2rem); }
.fw-total b { display: block; font-size: 0.56rem; letter-spacing: 0.22em; text-transform: uppercase;
  font-weight: 600; color: var(--muted); }
.fw-total span { font-family: var(--serif); font-size: 1.45rem; color: var(--navy); line-height: 1.2; }
.fw-total small { font-size: 0.68rem; color: var(--muted); display: block; }
.fw-foot .grow { flex: 1; }
.fw-back { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
  color: var(--muted); background: none; border: 0; cursor: pointer; padding: 0.9rem 0.4rem; font-family: var(--sans); }
.fw-back:hover { color: var(--navy); }
.fw-next { font-family: var(--sans); font-size: 0.66rem; letter-spacing: 0.22em; text-transform: uppercase;
  font-weight: 600; color: #fff; background: var(--navy); border: 0; border-radius: 3px; cursor: pointer;
  padding: 1rem 1.9rem; transition: background 0.25s var(--ease); }
.fw-next:hover { background: var(--navy-soft); }
.fw-next[disabled] { opacity: 0.6; cursor: default; }

.fw-err { display: none; text-align: center; font-size: 0.84rem; color: #a33; margin-top: 1.4rem; }
.err-hl { border-color: #c0392b !important; }
.seg-err { outline: 1px solid #c0392b; outline-offset: 2px; border-radius: 3px; }

/* Done state */
.fw-done { text-align: center; padding: clamp(4rem, 14vh, 7rem) 1rem 4rem; }
.fw-done .eyebrow { display: inline-flex; margin-bottom: 1.4rem; }
.fw-done h1 { font-family: var(--serif); font-weight: 400; font-size: clamp(2.2rem, 5vw, 3rem); color: var(--navy); margin: 0 0 1rem; }
.fw-done p { font-family: var(--serif); font-size: 1.1rem; color: var(--muted); max-width: 44ch; margin: 0 auto 2.2rem; line-height: 1.6; }

@media (max-width: 560px) {
  .fw-total span { font-size: 1.15rem; }
  .fw-next { padding: 0.85rem 1.2rem; font-size: 0.6rem; letter-spacing: 0.16em; }
  .fw-wrap { padding-bottom: 8rem; }
}
</style>

<body>

<div class="fw-top">
  <div class="fw-bar">
    <a class="fw-brand" href="/">JCS</a>
    <a class="fw-exit" href="/">Exit</a>
  </div>
  <div class="fw-progress"><i id="fw-bar"></i></div>
</div>

<main class="fw-wrap" id="fw-main"></main>

<div class="fw-foot" id="fw-foot">
  <div class="fw-foot__in">
    <div class="fw-total">
      <b>Estimated Total</b>
      <span id="fw-total">—</span>
      <small id="fw-total-note" hidden></small>
    </div>
    <span class="grow"></span>
    <button class="fw-back" id="fw-back" hidden>Back</button>
    <button class="fw-next" id="fw-next">Continue &rarr;</button>
  </div>
</div>

<script src="/pricing-data.js"></script>
<script>
(function () {
  var P = window.JCS_PRICING;
  var $ = function (id) { return document.getElementById(id); };
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); };
  var money = function (n) { return n == null ? '—' : '$' + Number(n).toLocaleString(); };

  // ------------------------------------------------------------ state
  var st = {
    step: 1,
    sqft: '',
    services: {},        // key -> true
    addons: {},          // "<svcKey>|<name>" -> true
    extras: {},          // extra name -> true
    address: '', city: '', state: 'CA', zip: '',
    status: '', listing: '', offmarket: '', faces: '', view: '', access: '', homeowner: '',
    shoot_date: '', launch_date: '',
    first: '', last: '', phone: '', email: '', brokerage: '', message: '',
    signature: ''
  };
  var STEPS = ['Services', 'Add-ons', 'Property', 'Details', 'Timing', 'Review', 'Agreement'];

  // ------------------------------------------------------------ pricing
  function svcPrice(svc) {
    if (svc.quote) return null;
    if (!st.sqft) return { label: 'From ' + money(svc.tiers[0]), value: null };
    var p = P.priceAt(svc.tiers, st.sqft);
    return p == null ? { label: 'Inquire', value: null } : { label: money(p), value: p };
  }
  function extraPrice(x) {
    if (x.tiers) {
      if (!st.sqft) return { label: 'From ' + money(x.tiers[0]), value: null };
      var p = P.priceAt(x.tiers, st.sqft);
      return p == null ? { label: 'Inquire', value: null } : { label: money(p), value: p };
    }
    var v = (x.bigAt && Number(st.sqft) > x.bigAt) ? x.bigPrice : x.price;
    return { label: money(v), value: v };
  }
  function total() {
    var sum = 0, any = false, perUnit = false, inquire = false;
    P.services.forEach(function (svc) {
      if (!st.services[svc.key] || svc.quote) return;
      var p = svcPrice(svc); any = true;
      if (p.value == null) { inquire = true; return; }
      sum += p.value;
      svc.addons.forEach(function (a) {
        if (!st.addons[svc.key + '|' + a.name]) return;
        if (a.unit) { perUnit = true; return; }
        sum += a.price;
      });
    });
    P.extras.forEach(function (x) {
      if (!st.extras[x.name]) return;
      var p = extraPrice(x); any = true;
      if (p.value == null) { inquire = true; return; }
      sum += p.value;
    });
    return { sum: sum, any: any, perUnit: perUnit, inquire: inquire };
  }
  function paintTotal() {
    var t = total();
    $('fw-total').textContent = (!t.any || (!t.sum && t.inquire)) ? '—' : money(t.sum) + (t.inquire ? ' +' : '');
    var note = $('fw-total-note');
    if (t.inquire) { note.textContent = 'Over ' + P.sqftCap.toLocaleString() + ' sqft — final quote on review.'; note.hidden = false; }
    else if (t.perUnit) { note.textContent = 'Per-image services quoted after the shoot.'; note.hidden = false; }
    else note.hidden = true;
  }

  // ------------------------------------------------------------ steps
  function eyebrow(n) {
    return '<div class="fw-eyebrow">Step ' + n + ' of 7 · ' + STEPS[n - 1] + '</div>';
  }

  function s1() {
    var cards = P.services.map(function (svc) {
      var p = svcPrice(svc);
      return '<button type="button" class="fw-card' + (st.services[svc.key] ? ' on' : '') + '" data-svc="' + svc.key + '">' +
        '<span class="tick">&#10003;</span><b>' + esc(svc.name) + '</b><p>' + esc(svc.desc) + '</p>' +
        '<span class="pr">' + (svc.quote ? '<small>Let&rsquo;s talk</small>' : p.label +
          (!st.sqft ? ' <small>by square footage</small>' : '')) + '</span></button>';
    }).join('');
    return eyebrow(1) +
      '<h1 class="fw-h">Build your shoot.</h1>' +
      '<p class="fw-sub">Enter the square footage, then choose the services you&rsquo;d like &mdash; pricing updates as you go.</p>' +
      '<div class="fw-label" style="text-align:center">Square Footage</div>' +
      '<input class="fw-input fw-sqft" id="f-sqft" inputmode="numeric" placeholder="4,500" value="' + esc(st.sqft) + '">' +
      '<p class="fw-hint" style="text-align:center">Include ADUs, guest houses, garages, and gym/studio space.</p>' +
      '<div class="fw-cards" id="f-cards">' + cards + '</div>' +
      '<p class="fw-microcopy">Prefer to talk first? <a href="mailto:jacxbschrader@gmail.com">jacxbschrader@gmail.com</a> &nbsp;·&nbsp; <a href="tel:+14088248719">(408)&nbsp;824-8719</a></p>';
  }

  function s2() {
    var groups = '';
    P.services.forEach(function (svc) {
      if (!st.services[svc.key] || !svc.addons.length) return;
      groups += '<div class="fw-label">' + esc(svc.name) + ' Add-ons</div><div class="fw-adds">' +
        svc.addons.map(function (a) {
          var k = svc.key + '|' + a.name;
          return '<button type="button" class="fw-add' + (st.addons[k] ? ' on' : '') + '" data-add="' + esc(k) + '">' +
            '<span class="tick">&#10003;</span><span>' + esc(a.name) + '</span>' +
            '<span class="apr">+' + money(a.price) + (a.unit ? '/' + a.unit : '') + '</span></button>';
        }).join('') + '</div>';
    });
    var extras = '<div class="fw-label">Extras</div><div class="fw-adds">' +
      P.extras.map(function (x) {
        var p = extraPrice(x);
        return '<button type="button" class="fw-add' + (st.extras[x.name] ? ' on' : '') + '" data-extra="' + esc(x.name) + '">' +
          '<span class="tick">&#10003;</span><span>' + esc(x.name) + '</span>' +
          '<span class="apr">' + (p.value == null && x.tiers ? p.label : '+' + p.label) + '</span></button>';
      }).join('') + '</div>';
    return eyebrow(2) +
      '<h1 class="fw-h">Elevate it.</h1>' +
      '<p class="fw-sub">Optional add-ons, based on the services you selected.</p>' +
      groups + extras +
      '<p class="fw-note">Twilight and vertical/vignette work are highly encouraged for luxury listings &mdash; they meaningfully elevate the presentation.</p>';
  }

  function s3() {
    return eyebrow(3) +
      '<h1 class="fw-h">Where are we shooting?</h1>' +
      '<p class="fw-sub">The property location, so I can plan travel and timing.</p>' +
      '<div class="fw-grid">' +
      '<div class="fw-field full"><label>Property Address *</label><input id="f-address" required placeholder="7750 Lahontan Drive" value="' + esc(st.address) + '"></div>' +
      '<div class="fw-field"><label>City *</label><input id="f-city" required placeholder="Danville" value="' + esc(st.city) + '"></div>' +
      '<div class="fw-field" style="display:grid;grid-template-columns:1fr 1.4fr;gap:0.9rem">' +
        '<span><label>State</label><input id="f-state" value="' + esc(st.state) + '"></span>' +
        '<span><label>Zip</label><input id="f-zip" inputmode="numeric" value="' + esc(st.zip) + '"></span></div>' +
      '</div>';
  }

  function seg(id, opts, val) {
    return '<div class="fw-seg" id="' + id + '">' + opts.map(function (o) {
      return '<button type="button" data-v="' + esc(o) + '"' + (val === o ? ' class="on"' : '') + '>' + esc(o) + '</button>';
    }).join('') + '</div>';
  }

  function s4() {
    return eyebrow(4) +
      '<h1 class="fw-h">The property.</h1>' +
      '<p class="fw-sub">A few details so I can plan the light, the angles, and the day.</p>' +
      '<div class="fw-label">Current status *</div>' + seg('f-status', ['Vacant / Unstaged', 'Vacant / Staged', 'Homeowner Furniture', 'Unknown'], st.status) +
      '<div class="fw-label">Listing type *</div>' + seg('f-listing', ['For Sale', 'For Lease', 'Short-Term Rental', 'Off-Market / Personal'], st.listing) +
      '<div class="fw-label">Which way does the front of the home face?</div>' + seg('f-faces', ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'], st.faces) +
      '<p class="fw-hint">This tells me where the sun will be &mdash; and when the front, back, and key rooms get their best light.</p>' +
      '<div class="fw-label">Is this a view home?</div>' + seg('f-view', ['Yes', 'No'], st.view) +
      '<div class="fw-label">How will I access the property?</div>' +
      '<input class="fw-input" id="f-access" placeholder="e.g. Lockbox on the front door, agent meets on site, gate code&hellip;" value="' + esc(st.access) + '">' +
      '<div class="fw-label">Will the homeowner be home during the shoot?</div>' + seg('f-homeowner', ['Yes', 'No', 'Not sure'], st.homeowner) +
      '<p class="fw-hint">An empty home ensures a seamless on-site visit and the highest-quality content &mdash; it&rsquo;s encouraged that the homeowner be away for the duration.</p>';
  }

  function s5() {
    return eyebrow(5) +
      '<h1 class="fw-h">Timing.</h1>' +
      '<p class="fw-sub">When you&rsquo;d like to shoot, and when you&rsquo;d like everything delivered.</p>' +
      '<div class="fw-grid">' +
      '<div class="fw-field"><label>Desired shoot date *</label><input id="f-shoot" type="date" required value="' + esc(st.shoot_date) + '"></div>' +
      '<div class="fw-field"><label>Desired launch date</label><input id="f-launch" type="date" value="' + esc(st.launch_date) + '"></div>' +
      '</div>' +
      '<p class="fw-hint">If the shoot date isn&rsquo;t available, I&rsquo;ll offer the closest alternative. The launch date sets your delivery deadline.</p>' +
      '<p class="fw-note">Please note: standard turnaround is ' + P.turnaround + ', depending on the size of the property and the scope of work. I&rsquo;ll do everything possible to meet your launch date, but turnaround faster than the typical timeframe can&rsquo;t be guaranteed.</p>';
  }

  function sumRows() {
    var svcs = [], adds = [];
    P.services.forEach(function (svc) {
      if (!st.services[svc.key]) return;
      var p = svcPrice(svc);
      svcs.push(esc(svc.name) + (svc.quote ? '' : ' — ' + p.label));
      svc.addons.forEach(function (a) {
        if (st.addons[svc.key + '|' + a.name]) adds.push(esc(a.name) + ' (+' + money(a.price) + (a.unit ? '/' + a.unit : '') + ')');
      });
    });
    P.extras.forEach(function (x) {
      if (st.extras[x.name]) adds.push(esc(x.name) + ' (' + extraPrice(x).label + ')');
    });
    var rows = '';
    var addr = [st.address, st.city].filter(Boolean).join(', ');
    if (addr) rows += '<div class="fw-sumrow"><b>Property</b><span>' + esc(addr) + '</span></div>';
    if (st.sqft) rows += '<div class="fw-sumrow"><b>Square footage</b><span>' + Number(st.sqft).toLocaleString() + ' sqft</span></div>';
    if (svcs.length) rows += '<div class="fw-sumrow"><b>Services</b><span>' + svcs.join('<br>') + '</span></div>';
    if (adds.length) rows += '<div class="fw-sumrow"><b>Add-ons</b><span>' + adds.join('<br>') + '</span></div>';
    if (st.shoot_date) rows += '<div class="fw-sumrow"><b>Shoot date</b><span>' + esc(st.shoot_date) + '</span></div>';
    if (st.launch_date) rows += '<div class="fw-sumrow"><b>Launch date</b><span>' + esc(st.launch_date) + '</span></div>';
    var t = total();
    rows += '<div class="fw-sumrow total"><b>Estimated total</b><span>' + ((!t.any || (!t.sum && t.inquire)) ? 'Custom quote' : money(t.sum) + (t.inquire ? ' +' : '')) + '</span></div>';
    return rows;
  }

  function s6() {
    return eyebrow(6) +
      '<h1 class="fw-h">Review.</h1>' +
      '<p class="fw-sub">Confirm your details and review the booking below.</p>' +
      '<div class="fw-grid">' +
      '<div class="fw-field"><label>First name *</label><input id="f-first" required autocomplete="given-name" value="' + esc(st.first) + '"></div>' +
      '<div class="fw-field"><label>Last name *</label><input id="f-last" required autocomplete="family-name" value="' + esc(st.last) + '"></div>' +
      '<div class="fw-field"><label>Phone *</label><input id="f-phone" type="tel" required autocomplete="tel" placeholder="(408) 555-0123" value="' + esc(st.phone) + '"></div>' +
      '<div class="fw-field"><label>Email *</label><input id="f-email" type="email" required autocomplete="email" placeholder="name@example.com" value="' + esc(st.email) + '"></div>' +
      '<div class="fw-field full"><label>Brokerage / company <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><input id="f-brokerage" autocomplete="organization" value="' + esc(st.brokerage) + '"></div>' +
      '<div class="fw-field full"><label>Anything else? <span style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></label><textarea id="f-message" rows="3" placeholder="The listing story, what matters most, special requests&hellip;">' + esc(st.message) + '</textarea></div>' +
      '</div>' +
      '<input type="text" id="f-honey" style="display:none" tabindex="-1" autocomplete="off">' +
      '<div class="fw-summary"><h3>Your booking</h3>' + sumRows() + '</div>' +
      '<p class="fw-hint" style="text-align:center;margin-top:1.2rem">Final quote confirmed on booking &mdash; you&rsquo;ll also receive a client portal link to track everything.</p>';
  }

  function s7() {
    return eyebrow(7) +
      '<h1 class="fw-h">Agreement.</h1>' +
      '<p class="fw-sub">Please review and sign to submit your request.</p>' +
      '<div class="fw-terms">' +
      '<h4>Usage Rights &amp; Ownership</h4>' +
      '<p>All photos, films, and related media (&ldquo;Content&rdquo;) remain the sole property and copyright of JCS LLC. You are granted a non-transferable license to use the Content for the marketing and sale of the specific property captured. Redistribution, resale, or repurposing for other properties or third parties requires written consent. The Content may not be altered in ways that misrepresent the original work, including AI-driven alteration or virtual staging without disclosure. JCS reserves the right to use Content for portfolio, promotional, and social purposes unless requested otherwise in writing.</p>' +
      '<h4>Advertising Standards &amp; Disclosure</h4>' +
      '<p>Some jurisdictions and MLS bodies have rules on disclosing digitally altered media (including virtual staging and virtual twilight). Determining whether disclosure is required is the client&rsquo;s responsibility, and the client assumes liability for the proper representation of the property in published media.</p>' +
      '<h4>Shoot Day</h4>' +
      '<p>Properties are shot as-is &mdash; cleaning, de-cluttering, and staging are not included. It is strongly encouraged that the homeowner be away for the duration of the visit. If no client representative is present during the shoot, creative choices (angles, compositions, lighting, staging adjustments, music, and the volume of media delivered) are final. Cancellations within 24 hours of the shoot may incur a fee.</p>' +
      '<h4>Revisions</h4>' +
      '<p>The first round of revisions is included with every delivery. Extensive additional revision requests may incur further fees, discussed before any work begins.</p>' +
      '<h4>Liability</h4>' +
      '<p>JCS LLC is not liable for injuries, damages, or losses incurred on site. The client is responsible for the property being accessible and ready at the scheduled time.</p>' +
      '<h4>Payment</h4>' +
      '<p>Your date is reserved on confirmation. Unless otherwise arranged, payment is due upon receipt of the final invoice, delivered with your media.</p>' +
      '</div>' +
      '<div class="fw-sign fw-field"><label>Sign &mdash; type your full legal name *</label>' +
      '<input id="f-signature" required autocomplete="name" placeholder="' + esc((st.first + ' ' + st.last).trim() || 'Your full name') + '" value="' + esc(st.signature) + '"></div>' +
      '<p class="fw-signnote">Typing your name above serves as your electronic signature and constitutes acceptance of the terms. Questions? <a href="mailto:jacxbschrader@gmail.com" style="color:var(--navy)">Ask before signing</a>.</p>';
  }

  // ------------------------------------------------------------ render
  var RENDER = [s1, s2, s3, s4, s5, s6, s7];
  function render() {
    $('fw-main').innerHTML = RENDER[st.step - 1]() + '<p class="fw-err" id="fw-err">Please complete the highlighted fields to continue.</p>';
    $('fw-bar').style.width = (st.step / 7 * 100) + '%';
    $('fw-back').hidden = st.step === 1;
    $('fw-next').innerHTML = st.step === 7 ? 'Submit Request' : 'Continue &rarr;';
    wire();
    window.scrollTo({ top: 0 });
    paintTotal();
  }

  function capture() {
    var grab = function (id, key) { var el = $(id); if (el) st[key] = el.value.trim(); };
    grab('f-sqft', 'sqft'); grab('f-address', 'address'); grab('f-city', 'city');
    grab('f-state', 'state'); grab('f-zip', 'zip'); grab('f-access', 'access');
    grab('f-shoot', 'shoot_date'); grab('f-launch', 'launch_date');
    grab('f-first', 'first'); grab('f-last', 'last'); grab('f-phone', 'phone');
    grab('f-email', 'email'); grab('f-brokerage', 'brokerage'); grab('f-message', 'message');
    grab('f-signature', 'signature');
    if ($('f-sqft')) st.sqft = st.sqft.replace(/[^0-9]/g, '');
  }

  function wire() {
    var sq = $('f-sqft');
    if (sq) sq.addEventListener('input', function () {
      st.sqft = sq.value.replace(/[^0-9]/g, '');
      document.querySelectorAll('#f-cards .fw-card').forEach(function (c) {
        var svc = P.services.find(function (s) { return s.key === c.dataset.svc; });
        var p = svcPrice(svc);
        c.querySelector('.pr').innerHTML = svc.quote ? '<small>Let&rsquo;s talk</small>'
          : p.label + (!st.sqft ? ' <small>by square footage</small>' : '');
      });
      paintTotal();
    });
    document.querySelectorAll('[data-svc]').forEach(function (b) {
      b.addEventListener('click', function () {
        var k = b.dataset.svc;
        st.services[k] = !st.services[k];
        if (!st.services[k]) {
          Object.keys(st.addons).forEach(function (ak) { if (ak.indexOf(k + '|') === 0) delete st.addons[ak]; });
        }
        b.classList.toggle('on', !!st.services[k]);
        paintTotal();
      });
    });
    document.querySelectorAll('[data-add]').forEach(function (b) {
      b.addEventListener('click', function () {
        st.addons[b.dataset.add] = !st.addons[b.dataset.add];
        b.classList.toggle('on', !!st.addons[b.dataset.add]);
        paintTotal();
      });
    });
    document.querySelectorAll('[data-extra]').forEach(function (b) {
      b.addEventListener('click', function () {
        st.extras[b.dataset.extra] = !st.extras[b.dataset.extra];
        b.classList.toggle('on', !!st.extras[b.dataset.extra]);
        paintTotal();
      });
    });
    [['f-status', 'status'], ['f-listing', 'listing'], ['f-faces', 'faces'], ['f-view', 'view'], ['f-homeowner', 'homeowner']].forEach(function (pair) {
      var host = $(pair[0]); if (!host) return;
      host.querySelectorAll('button').forEach(function (b) {
        b.addEventListener('click', function () {
          st[pair[1]] = b.dataset.v;
          host.classList.remove('seg-err');
          host.querySelectorAll('button').forEach(function (x) { x.classList.toggle('on', x === b); });
        });
      });
    });
  }

  function invalid() {
    capture();
    var bad = [];
    var hl = function (id) { var el = $(id); if (el) el.classList.add('err-hl'); bad.push(id); };
    document.querySelectorAll('.err-hl').forEach(function (el) { el.classList.remove('err-hl'); });
    document.querySelectorAll('.seg-err').forEach(function (el) { el.classList.remove('seg-err'); });
    if (st.step === 1) {
      if (!st.sqft) hl('f-sqft');
      if (!Object.keys(st.services).some(function (k) { return st.services[k]; })) {
        document.querySelectorAll('#f-cards .fw-card').forEach(function (c) { c.classList.add('err-hl'); });
        bad.push('services');
      }
    }
    if (st.step === 3) { if (!st.address) hl('f-address'); if (!st.city) hl('f-city'); }
    if (st.step === 4) {
      if (!st.status) { $('f-status').classList.add('seg-err'); bad.push('status'); }
      if (!st.listing) { $('f-listing').classList.add('seg-err'); bad.push('listing'); }
    }
    if (st.step === 5) { if (!st.shoot_date) hl('f-shoot'); }
    if (st.step === 6) {
      if (!st.first) hl('f-first'); if (!st.last) hl('f-last');
      if (!st.phone) hl('f-phone');
      if (!st.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(st.email)) hl('f-email');
    }
    if (st.step === 7) { if (!st.signature || st.signature.length < 4) hl('f-signature'); }
    return bad.length;
  }

  // ------------------------------------------------------------ submit
  async function submit() {
    capture();
    var btn = $('fw-next');
    btn.disabled = true; btn.textContent = 'Sending…';
    var svcs = [], adds = [];
    P.services.forEach(function (svc) {
      if (!st.services[svc.key]) return;
      var p = svcPrice(svc);
      svcs.push(svc.name + (svc.quote ? '' : ' (' + p.label + ')'));
      svc.addons.forEach(function (a) {
        if (st.addons[svc.key + '|' + a.name]) adds.push(a.name + ' (+$' + a.price + (a.unit ? '/' + a.unit : '') + ')');
      });
    });
    P.extras.forEach(function (x) {
      if (st.extras[x.name]) adds.push(x.name + ' (' + extraPrice(x).label + ')');
    });
    var t = total();
    try {
      var r = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: (st.first + ' ' + st.last).trim(),
          email: st.email, phone: st.phone, brokerage: st.brokerage,
          address: st.address, city: st.city, state: st.state, zip: st.zip,
          sqft: st.sqft, target_date: st.shoot_date, launch_date: st.launch_date,
          services: svcs.join(' · '), addons: adds.join(' · '),
          estimated_total: (t.any && t.sum && !t.inquire) ? t.sum : null,
          details: JSON.stringify({
            status: st.status, listing_type: st.listing, faces: st.faces,
            view_home: st.view, access: st.access, homeowner_home: st.homeowner
          }),
          message: st.message, signature: st.signature,
          _honey: ($('f-honey') || { value: '' }).value
        })
      });
      if (!r.ok) throw new Error();
      $('fw-main').innerHTML =
        '<div class="fw-done"><span class="eyebrow">Request received</span>' +
        '<h1>Thank you.</h1>' +
        '<p>I review every request personally &mdash; you&rsquo;ll hear from me within 24 hours with availability and your confirmed quote. A confirmation is on its way to your inbox.</p>' +
        '<a class="btn btn--solid" href="/projects">View Recent Work</a></div>';
      $('fw-foot').remove();
      window.scrollTo({ top: 0 });
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Submit Request';
      var err = $('fw-err');
      err.textContent = 'Something went wrong — please try again, or email jacxbschrader@gmail.com directly.';
      err.style.display = 'block';
    }
  }

  // ------------------------------------------------------------ nav
  $('fw-next').addEventListener('click', function () {
    if (invalid()) { $('fw-err').style.display = 'block'; return; }
    if (st.step === 7) { submit(); return; }
    st.step++; render();
  });
  $('fw-back').addEventListener('click', function () { capture(); st.step--; render(); });

  render();
})();
</script>
</body>
</html>
