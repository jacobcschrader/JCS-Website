<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JCS — Admin Password Hasher</title>
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f6f4ef; color: #16233b;
         display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; padding: 1.5rem; }
  .card { background: #fff; width: min(460px, 100%); padding: 2.5rem; box-shadow: 0 20px 60px rgba(15,34,64,0.08); }
  h1 { font-family: Georgia, serif; font-style: italic; font-weight: 400; font-size: 1.5rem; color: #0f2240; margin: 0 0 0.4rem; }
  p { font-size: 0.85rem; line-height: 1.6; color: #5d6a7e; margin: 0 0 1.4rem; }
  label { display: block; font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: #5d6a7e; margin-bottom: 0.35rem; }
  input { width: 100%; box-sizing: border-box; font-size: 1rem; padding: 0.7rem; border: 1px solid #d8d4ca; background: #f6f4ef; outline: none; margin-bottom: 1rem; }
  input:focus { border-color: #0f2240; background: #fff; }
  button { background: #0f2240; color: #fff; border: 0; cursor: pointer; font-size: 0.75rem; letter-spacing: 0.14em;
           text-transform: uppercase; padding: 0.85rem 1.8rem; width: 100%; }
  #out { display: none; margin-top: 1.4rem; }
  textarea { width: 100%; box-sizing: border-box; font-family: Menlo, monospace; font-size: 0.72rem; padding: 0.7rem;
             border: 1px solid #d8d4ca; background: #f6f4ef; min-height: 84px; resize: none; }
  .copy { margin-top: 0.6rem; background: #fff; color: #0f2240; border: 1px solid #0f2240; }
  .ok { color: #2e5d3a; font-size: 0.8rem; margin-top: 0.5rem; display: none; }
  .err { color: #a33; font-size: 0.85rem; margin-top: 0.8rem; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Admin password hasher</h1>
  <p>Runs entirely on this computer — your password is never sent anywhere.
     Type your chosen admin password, then copy the hash into Vercel as
     <b>ADMIN_PASSWORD_HASH</b>.</p>
  <label for="pw">Choose your admin password (8+ characters)</label>
  <input id="pw" type="password" autocomplete="new-password">
  <button id="go">Generate hash</button>
  <p class="err" id="err"></p>
  <div id="out">
    <label for="hash">Your ADMIN_PASSWORD_HASH value</label>
    <textarea id="hash" readonly onclick="this.select()"></textarea>
    <button class="copy" id="copy">Copy to clipboard</button>
    <p class="ok" id="ok">Copied — paste it into Vercel, then redeploy.</p>
  </div>
</div>
<script>
// Mirrors api/_lib/auth.js exactly: PBKDF2-SHA256, 310,000 iterations,
// 32-byte key, output "saltHex:iterations:hashHex".
var ITER = 310000;
function hex(buf){ return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join(""); }

document.getElementById("go").addEventListener("click", async function () {
  var err = document.getElementById("err");
  err.style.display = "none";
  var pw = document.getElementById("pw").value;
  if (pw.length < 8) { err.textContent = "Password must be at least 8 characters."; err.style.display = "block"; return; }
  try {
    var enc = new TextEncoder();
    var saltHex = hex(crypto.getRandomValues(new Uint8Array(16)).buffer);
    var key = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveBits"]);
    var bits = await crypto.subtle.deriveBits(
      { name: "PBKDF2", salt: enc.encode(saltHex), iterations: ITER, hash: "SHA-256" }, key, 256);
    document.getElementById("hash").value = saltHex + ":" + ITER + ":" + hex(bits);
    document.getElementById("out").style.display = "block";
  } catch (e) {
    err.textContent = "This browser blocked crypto on a local file — try opening this page in Safari or Chrome.";
    err.style.display = "block";
  }
});
document.getElementById("copy").addEventListener("click", function () {
  var t = document.getElementById("hash"); t.select();
  navigator.clipboard ? navigator.clipboard.writeText(t.value) : document.execCommand("copy");
  document.getElementById("ok").style.display = "block";
});
</script>
</body>
</html>
