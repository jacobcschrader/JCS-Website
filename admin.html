<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Studio Admin — Jacob Schrader</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ================= Studio Admin — sidebar app =================
   Brand tokens come from styles.css (--navy, --serif, --sans, …) */
body { background: var(--paper-warm); }
.adm-hidden { display: none !important; }

/* ---- Login ---- */
.adm-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.adm-login__card { background: #fff; width: min(400px, 100%); padding: clamp(2rem, 5vw, 3rem); box-shadow: 0 20px 60px rgba(15,34,64,0.08); text-align: center; }
.adm-login__brand { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 2.2rem; color: var(--navy); }
.adm-login__sub { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin: 0.5rem 0 2rem; }

/* ---- Shell: sidebar + content ---- */
.adm-app { display: flex; min-height: 100vh; }
.adm-side { width: 216px; flex: 0 0 216px; background: var(--navy); color: #fff; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.adm-side__brand { padding: 2rem 1.6rem 1.6rem; }
.adm-side__brand b { display: block; font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 1.9rem; line-height: 1; }
.adm-side__brand span { display: block; margin-top: 0.5rem; font-size: 0.58rem; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.adm-side nav { flex: 1; padding: 0.6rem 0; }
.adm-side nav a { display: block; padding: 0.72rem 1.6rem; color: rgba(255,255,255,0.62); font-size: 0.84rem; letter-spacing: 0.05em; border-left: 2px solid transparent; cursor: pointer; }
.adm-side nav a:hover { color: #fff; }
.adm-side nav a.on { color: #fff; border-left-color: #fff; background: rgba(255,255,255,0.05); }
.adm-side__foot { padding: 1.4rem 1.6rem; border-top: 1px solid rgba(255,255,255,0.12); }
.adm-side__foot a { color: rgba(255,255,255,0.55); font-size: 0.74rem; letter-spacing: 0.1em; cursor: pointer; }
.adm-side__foot a:hover { color: #fff; }
.adm-main { flex: 1; min-width: 0; padding: clamp(1.4rem, 3vw, 2.6rem) clamp(1.2rem, 3.5vw, 3rem) 5rem; }

/* ---- View header ---- */
.adm-head { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
.adm-head h1 { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 1.8rem; color: var(--navy); margin: 0; }
.adm-head .grow { flex: 1; }
.adm-back { font-size: 0.74rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: pointer; }
.adm-back:hover { color: var(--navy); }

/* ---- Buttons / badges / tables ---- */
.adm-btn { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--navy); color: #fff; border: 0; cursor: pointer; font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.75rem 1.5rem; }
.adm-btn:hover { background: var(--navy-soft); }
.adm-btn--ghost { background: none; color: var(--navy); border: 1px solid var(--line); }
.adm-btn--ghost:hover { background: #fff; }
.adm-btn--danger { background: none; color: #a33; border: 1px solid #d8c3c3; }
.adm-badge { display: inline-block; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.25rem 0.6rem; background: var(--paper-warm); color: var(--muted); }
.adm-badge--live { background: #e8f0e8; color: #2e5d3a; }
.adm-badge--draft { background: #f4ede0; color: #8a6d2f; }
.adm-badge--upcoming { background: #e8edf5; color: var(--navy); }
.adm-badge--editing { background: #f4ede0; color: #8a6d2f; }
.adm-badge--revisions { background: #f5ece4; color: #8a4d2f; }
.adm-badge--delivered { background: #ece8f5; color: #4a3d7a; }
.adm-badge--completed { background: #e8f0e8; color: #2e5d3a; }
.adm-badge--paid { background: #dfeee2; color: #1d4d2a; }
.adm-badge--canceled { background: #f5e8e8; color: #7a3d3d; }
.adm-badge--pending { background: #f4ede0; color: #8a6d2f; }
.adm-badge--accepted { background: #e8f0e8; color: #2e5d3a; }
.adm-badge--declined { background: #f5e8e8; color: #7a3d3d; }
.adm-count { display: inline-block; min-width: 18px; text-align: center; background: #b23b3b; color: #fff; font-size: 0.62rem; font-weight: 600; border-radius: 9px; padding: 0.1rem 0.35rem; margin-left: 0.5rem; }

.adm-card { background: #fff; padding: clamp(1.2rem, 2.5vw, 1.8rem); }
.adm-card + .adm-card { margin-top: 1.4rem; }
.adm-card h2 { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 1.15rem; color: var(--navy); margin: 0 0 1rem; }
.adm-table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
.adm-table th { text-align: left; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 600; padding: 0.55rem 0.8rem 0.55rem 0; border-bottom: 1px solid var(--line); }
.adm-table td { padding: 0.8rem 0.8rem 0.8rem 0; border-bottom: 1px solid var(--line-soft); color: var(--ink); vertical-align: middle; }
.adm-table tr.click { cursor: pointer; }
.adm-table tr.click:hover td { background: var(--paper-warm); }
.adm-empty { color: var(--muted); font-size: 0.9rem; padding: 1rem 0; }
small.mut { color: var(--muted); }

/* ---- Dashboard ---- */
.adm-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.4rem; }
.adm-stat { background: #fff; padding: 1.3rem 1.4rem; }
.adm-stat b { display: block; font-family: var(--serif); font-size: 1.9rem; font-weight: 500; color: var(--navy); line-height: 1.15; }
.adm-stat span { font-size: 0.64rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.adm-cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 1.4rem; align-items: start; }
@media (max-width: 980px) { .adm-cols { grid-template-columns: 1fr; } }
.adm-day { display: flex; gap: 1rem; padding: 0.7rem 0; border-bottom: 1px solid var(--line-soft); }
.adm-day__date { flex: 0 0 74px; text-align: center; }
.adm-day__date b { display: block; font-family: var(--serif); font-size: 1.35rem; color: var(--navy); line-height: 1.1; }
.adm-day__date span { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.adm-day__body { flex: 1; cursor: pointer; }
.adm-day__body:hover .t { text-decoration: underline; text-underline-offset: 3px; }
.adm-day__body .t { color: var(--ink); font-size: 0.92rem; }
.adm-feed li { list-style: none; padding: 0.65rem 0; border-bottom: 1px solid var(--line-soft); font-size: 0.86rem; color: var(--ink); }
.adm-feed li small { display: block; color: var(--muted); margin-top: 0.15rem; }
.adm-feed { margin: 0; padding: 0; }

/* ---- Pipeline (kanban) ---- */
.adm-pipe { display: grid; grid-template-columns: repeat(6, minmax(190px, 1fr)); gap: 1rem; overflow-x: auto; align-items: start; padding-bottom: 0.5rem; }
@media (max-width: 1200px) { .adm-pipe { display: flex; } .adm-pipe .adm-col { flex: 0 0 240px; } }
.adm-col { background: rgba(15,34,64,0.045); padding: 0.8rem; min-height: 220px; }
.adm-col.dragover { outline: 2px dashed var(--navy); outline-offset: -2px; }
.adm-col__head { display: flex; align-items: baseline; gap: 0.5rem; padding: 0.2rem 0.3rem 0.8rem; }
.adm-col__head b { font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy); font-weight: 600; }
.adm-col__head span { font-size: 0.66rem; color: var(--muted); }
.adm-col__sum { margin-left: auto; font-size: 0.7rem; color: var(--muted); }
.adm-cardlet { background: #fff; padding: 0.85rem 0.95rem; margin-bottom: 0.7rem; cursor: grab; box-shadow: 0 1px 3px rgba(15,34,64,0.06); position: relative; }
.adm-cardlet:active { cursor: grabbing; }
.adm-cardlet.dragging { opacity: 0.4; }
.adm-cardlet b { display: block; font-family: var(--serif); font-weight: 500; font-size: 0.98rem; color: var(--navy); margin-bottom: 0.2rem; cursor: pointer; }
.adm-cardlet b:hover { text-decoration: underline; text-underline-offset: 3px; }
.adm-cardlet small { display: block; color: var(--muted); font-size: 0.76rem; line-height: 1.5; }
.adm-cardlet .adv { position: absolute; right: 0.5rem; bottom: 0.45rem; background: none; border: 0; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0.2rem 0.4rem; }
.adm-cardlet .adv:hover { color: var(--navy); }

/* ---- Pipeline toolbar + stacked stages ---- */
.adm-tools { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.4rem; }
.adm-seg { display: inline-flex; border: 1px solid var(--line); background: #fff; }
.adm-seg button { background: none; border: 0; cursor: pointer; font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0.55rem 1rem; }
.adm-seg button.on { background: var(--navy); color: #fff; }
.adm-tools input[type=search], .adm-tools select { font-family: var(--sans); font-size: 0.85rem; color: var(--ink); background: #fff; border: 1px solid var(--line); padding: 0.5rem 0.7rem; outline: none; }
.adm-tools input[type=search] { min-width: 200px; }
.adm-tools input[type=search]:focus, .adm-tools select:focus { border-color: var(--navy); }

.adm-stage { background: #fff; border-left: 3px solid var(--navy); margin-bottom: 1.1rem; }
.adm-stage__head { display: flex; align-items: baseline; gap: 0.7rem; padding: 0.95rem 1.2rem; cursor: pointer; user-select: none; }
.adm-stage__head b { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
.adm-stage__head .n { font-size: 0.74rem; color: var(--muted); }
.adm-stage__head .s { font-size: 0.74rem; color: var(--muted); margin-left: auto; }
.adm-stage__head .chev { color: var(--muted); font-size: 0.8rem; transition: transform 0.2s; }
.adm-stage.closed .chev { transform: rotate(-90deg); }
.adm-stage__body { padding: 0 1.2rem 1.1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 0.8rem; }
.adm-stage.closed .adm-stage__body { display: none; }
.adm-stage.dragover { outline: 2px dashed var(--navy); outline-offset: -2px; }
.adm-stage__body .adm-cardlet { margin-bottom: 0; border: 1px solid var(--line-soft); }

/* ---- Deliveries ---- */
.adm-delgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.2rem; }
.adm-del { background: #fff; padding: 1.2rem 1.3rem; }
.adm-del b { display: block; font-family: var(--serif); font-weight: 500; font-size: 1.05rem; color: var(--navy); cursor: pointer; }
.adm-del b:hover { text-decoration: underline; text-underline-offset: 3px; }
.adm-del small { display: block; color: var(--muted); margin: 0.3rem 0 0.8rem; line-height: 1.6; }
.adm-del .lnk { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--navy); text-decoration: underline; text-underline-offset: 4px; }
.adm-del .nolnk { font-size: 0.76rem; color: #8a6d2f; }

/* ---- Portfolio grid ---- */
.adm-projgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
.adm-proj { background: #fff; display: block; color: var(--ink); }
.adm-proj .ph-wrap { aspect-ratio: 3/2; background: var(--navy-deep); overflow: hidden; }
.adm-proj img { width: 100%; height: 100%; object-fit: cover; display: block; }
.adm-proj .cap { padding: 0.8rem 0.9rem 0.9rem; }
.adm-proj .cap b { display: block; font-family: var(--serif); font-weight: 500; font-size: 1rem; color: var(--navy); margin-bottom: 0.3rem; }

/* ---- Detail pages ---- */
.adm-detail { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem 2rem; margin-bottom: 0.4rem; }
.adm-kv label { display: block; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
.adm-kv div { font-size: 0.95rem; color: var(--ink); }
.adm-kv a { color: var(--navy); text-decoration: underline; text-underline-offset: 3px; }
.adm-notes { background: var(--paper-warm); padding: 1rem 1.2rem; font-size: 0.9rem; color: var(--ink); white-space: pre-line; margin-top: 1rem; }

/* ---- Modal ---- */
.adm-modal { position: fixed; inset: 0; z-index: 200; background: rgba(9,22,39,0.55); display: flex; align-items: flex-start; justify-content: center; padding: 4vh 1rem; overflow: auto; }
.adm-modal__card { background: #fff; width: min(640px, 100%); padding: clamp(1.5rem, 3vw, 2.2rem); }
.adm-modal__card h2 { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 1.4rem; color: var(--navy); margin: 0 0 1.2rem; }
.adm-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
.adm-form .full { grid-column: 1 / -1; }
@media (max-width: 560px) { .adm-form { grid-template-columns: 1fr; } }
.adm-field label { display: block; font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
.adm-field input, .adm-field select, .adm-field textarea { width: 100%; box-sizing: border-box; font-family: var(--sans); font-size: 0.9rem; color: var(--ink); background: var(--paper-warm); border: 1px solid var(--line); padding: 0.6rem 0.7rem; outline: none; }
.adm-field textarea { min-height: 70px; resize: vertical; }
.adm-field input:focus, .adm-field select:focus, .adm-field textarea:focus { border-color: var(--navy); background: #fff; }
.adm-msg { font-size: 0.85rem; margin-top: 0.8rem; color: #a33; }

/* ---- Mobile shell ---- */
@media (max-width: 760px) {
  .adm-app { flex-direction: column; }
  .adm-side { width: 100%; flex: none; height: auto; position: static; flex-direction: row; align-items: center; }
  .adm-side__brand { padding: 0.9rem 1rem; }
  .adm-side__brand span { display: none; }
  .adm-side nav { display: flex; padding: 0; overflow-x: auto; }
  .adm-side nav a { padding: 0.9rem 0.8rem; border-left: 0; border-bottom: 2px solid transparent; white-space: nowrap; }
  .adm-side nav a.on { border-left: 0; border-bottom-color: #fff; background: none; }
  .adm-side__foot { border: 0; padding: 0.9rem 1rem; }
  .adm-table .hide-m { display: none; }
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login" class="adm-login adm-hidden">
  <form id="login-form" class="adm-login__card">
    <div class="adm-login__brand">JCS</div>
    <div class="adm-login__sub">Studio Admin</div>
    <div class="adm-field" style="text-align:left;margin-bottom:0.9rem">
      <label for="l-email">Email</label>
      <input id="l-email" type="email" autocomplete="username" required>
    </div>
    <div class="adm-field" style="text-align:left;margin-bottom:1.4rem">
      <label for="l-pass">Password</label>
      <input id="l-pass" type="password" autocomplete="current-password" required>
    </div>
    <button class="adm-btn" type="submit" style="width:100%;justify-content:center">Sign in</button>
    <p id="login-msg" class="adm-msg adm-hidden"></p>
  </form>
</div>

<!-- ================= APP ================= -->
<div id="app" class="adm-app adm-hidden">
  <aside class="adm-side">
    <div class="adm-side__brand"><b>JCS</b><span>Studio Admin</span></div>
    <nav id="nav">
      <a data-r="dash" class="on">Dashboard</a>
      <a data-r="requests">Requests<span class="adm-count adm-hidden" id="req-badge"></span></a>
      <a data-r="pipeline">Projects</a>
      <a data-r="deliveries">Deliveries</a>
      <a data-r="clients">Clients</a>
      <a data-r="portfolio">Portfolio</a>
      <a data-r="settings">Settings</a>
    </nav>
    <div class="adm-side__foot"><a id="logout">Sign out</a></div>
  </aside>
  <main class="adm-main" id="main"></main>
</div>

<!-- Modal root -->
<div id="modal-root"></div>

<script src="projects-data.js"></script>
<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
  function money(n){ return n==null||n===''?'—':'$'+Number(n).toLocaleString(); }
  function fmtT(t){ if(!/^\d{2}:\d{2}/.test(String(t||''))) return t||''; var p=t.slice(0,5).split(':'); var h=+p[0], ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+p[1]+' '+ap; }
  function discLabel(d){ return d.code + ' — ' + (d.kind === 'percent' ? Number(d.value) + '%' : '$' + Number(d.value).toLocaleString()) + (d.note ? ' · ' + d.note : ''); }
  function net(b){ return (Number(b.price) || 0) - (Number(b.discount_value) || 0); }
  function dstr(d){ if(!d) return '—'; var t=new Date(d); return isNaN(t)?'—':t.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

  var state = { clients: [], bookings: [], requests: [], discounts: [], reqTab: 'pending', loaded: false,
              view: localStorage.getItem('adm-view') || 'pipeline', q: '', clientFilter: '', collapsed: {} };
var STAGE_COLOR = { upcoming:'#4a6da8', editing:'#b98a2f', revisions:'#b9652f', delivered:'#7a5fb8', completed:'#3f7a4f', paid:'#1d4d2a' };
  var TYPES = ['Architectural Photography','Film / Videography','Aerial & Drone','Full Campaign (Stills + Film)','Other'];
  var ADDONS = {
    'Photography': ['Flash / Ambient Photography','Aerial Photography','Vertical / Vignette Images','Twilight Coverage'],
    'Film':        ['Cinematic Film','Social Reel'],
    'Beyond':      ['Floor Plan Schematics','Property Website']
  };
  var STAGES = ['upcoming','editing','revisions','delivered','completed','paid'];   // pipeline order
  var STAGE_LABEL = { upcoming:'Upcoming', editing:'Editing', revisions:'Revisions', delivered:'Delivered', completed:'Completed', paid:'Paid' };
  var STATUSES = STAGES.concat(['canceled']);

  async function api(path, method, body) {
    var r = await fetch('/api/admin/' + path, {
      method: method || 'GET',
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined
    });
    if (r.status === 401) { showLogin(); throw new Error('unauthorized'); }
    var j = await r.json().catch(function(){ return {}; });
    if (!r.ok) throw new Error(j.error || 'error');
    return j;
  }
  function friendly(err) {
    return String(err.message) === 'db-not-configured'
      ? 'Database not connected — check the Neon integration in Vercel.'
      : 'Something went wrong — try again.';
  }

  // ================= router =================
  function go(route) { location.hash = route; }
  function route() { return (location.hash || '#dash').slice(1); }
  window.addEventListener('hashchange', render);

  // ================= auth =================
  function showLogin(){ $('login').classList.remove('adm-hidden'); $('app').classList.add('adm-hidden'); }
  async function showApp(){
    $('login').classList.add('adm-hidden'); $('app').classList.remove('adm-hidden');
    try { await reload(); } catch (e) {}
    render();
  }
  async function reload() {
    var c = await api('clients'), b = await api('bookings'), r = await api('requests'), d = await api('discounts');
    state.clients = c.clients; state.bookings = b.bookings; state.requests = r.requests; state.discounts = d.discounts; state.loaded = true;
    var pending = state.requests.filter(function (x) { return x.status === 'pending'; }).length;
    var badge = $('req-badge');
    if (badge) { badge.textContent = pending; badge.classList.toggle('adm-hidden', !pending); }
  }
  $('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var msg = $('login-msg'); msg.classList.add('adm-hidden');
    var r = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: $('l-email').value, password: $('l-pass').value }) }).catch(function(){ return null; });
    if (!r || !r.ok) {
      msg.textContent = !r ? 'Network error — try again.' : 'Wrong email or password.';
      msg.classList.remove('adm-hidden'); return;
    }
    $('l-pass').value = ''; showApp();
  });
  $('logout').addEventListener('click', async function () {
    await fetch('/api/admin/logout', { method: 'POST' }).catch(function(){});
    showLogin();
  });

  // ================= modal =================
  function closeModal(){ $('modal-root').innerHTML = ''; }
  function openModal(title, formHtml, onSubmit) {
    $('modal-root').innerHTML =
      '<div class="adm-modal" id="modal-bg"><form class="adm-modal__card" id="modal-form">' +
      '<h2>' + esc(title) + '</h2><div class="adm-form">' + formHtml + '</div>' +
      '<div style="margin-top:1.4rem;display:flex;gap:0.8rem">' +
      '<button class="adm-btn" type="submit">Save</button>' +
      '<button class="adm-btn adm-btn--ghost" type="button" id="modal-cancel">Cancel</button></div>' +
      '<p class="adm-msg adm-hidden" id="modal-msg"></p></form></div>';
    $('modal-cancel').addEventListener('click', closeModal);
    $('modal-bg').addEventListener('mousedown', function (e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', function onEsc(e) { if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', onEsc); } });
    $('modal-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      try { await onSubmit(); closeModal(); } catch (err) {
        var m = $('modal-msg'); m.textContent = friendly(err); m.classList.remove('adm-hidden');
      }
    });
  }
  function fld(id, label, inner) {
    return '<div class="adm-field"><label for="' + id + '">' + label + '</label>' + inner + '</div>';
  }

  // ================= client form =================
  function clientModal(c, onSaved) {
    c = c || {};
    openModal(c.id ? 'Edit client' : 'New client',

  // ================= project (booking) form =================
  function bookingModal(b, presetClient, draft) {

    var clientOpts = '<option value="">—</option>' + state.clients.map(function (c) {
      var sel = (v.client_id || presetClient) == c.id ? ' selected' : '';

    }).join('');
    var typeOpts = TYPES.map(function (t) { return '<option' + (v.type === t ? ' selected' : '') + '>' + esc(t) + '</option>'; }).join('');
    var statusOpts = STATUSES.map(function (s) { return '<option value="' + s + '"' + (v.status === s ? ' selected' : '') + '>' + (STAGE_LABEL[s] || 'Canceled') + '</option>'; }).join('');

    }
    var standardAddons = Object.keys(ADDONS).reduce(function (all, g) { return all.concat(ADDONS[g]); }, []);
    var customAddons = checkedAddons.filter(function (x) { return standardAddons.indexOf(x) === -1; });
    var addonsHtml = Object.keys(ADDONS).map(function (group) {
      return '<div style="margin-top:0.6rem"><div style="font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem">' + group + '</div>' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.35rem 1rem">' +
        ADDONS[group].map(function (label) { return addonLabel(label, checkedAddons.indexOf(label) > -1); }).join('') +
        '</div></div>';
    }).join('') +
      '<div style="margin-top:0.6rem"><div style="font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem">Custom</div>' +
        '<div id="f-customlist" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.35rem 1rem">' +
        customAddons.map(function (label) { return addonLabel(label, true); }).join('') + '</div>' +
        '<div style="display:flex;gap:0.5rem;margin-top:0.5rem">' +
          '<input id="f-customsvc" placeholder="Add a custom service…" style="flex:1;font-family:var(--sans);font-size:0.85rem;color:var(--ink);background:var(--paper-warm);border:1px solid var(--line);padding:0.5rem 0.7rem;outline:none">' +
          '<button type="button" class="adm-btn adm-btn--ghost" id="f-addcustom" style="padding:0.45rem 0.9rem">+ Add</button>' +
        '</div></div>';

    openModal(b.id ? 'Edit project' : 'New project',
      '<div class="adm-field full"><label for="f-title">Property address *</label><input id="f-title" required placeholder="7750 Lahontan Drive" value="' + esc(v.title || '') + '"></div>' +
      fld('f-city', 'City', '<input id="f-city" placeholder="Truckee" value="' + esc(v.city || '') + '">') +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.9rem">' +
        '<div class="adm-field"><label for="f-state">State</label><input id="f-state" value="' + esc(v.state || 'CA') + '"></div>' +
        '<div class="adm-field"><label for="f-zip">Zip</label><input id="f-zip" value="' + esc(v.zip || '') + '"></div>' +
        '<div class="adm-field"><label for="f-sqft">Sqft</label><input id="f-sqft" type="number" min="0" value="' + (v.sqft == null ? '' : v.sqft) + '"></div>' +
      '</div>' +
      '<div class="adm-field"><label for="f-client">Client</label><div style="display:flex;gap:0.5rem"><select id="f-client" style="flex:1">' + clientOpts + '</select>' +
        '<button type="button" class="adm-btn adm-btn--ghost" id="f-newclient" style="padding:0.55rem 0.9rem">+ New</button></div></div>' +
      fld('f-type', 'Service', '<select id="f-type">' + typeOpts + '</select>') +
      fld('f-date', 'Shoot date', '<input id="f-date" type="date" value="' + (v.shoot_date ? String(v.shoot_date).slice(0, 10) : '') + '">') +
      fld('f-time', 'Shoot time', '<input id="f-time" type="time" value="' + esc((v.shoot_time || '').slice(0, 5)) + '">') +
      fld('f-twidate', 'Twilight <small style="text-transform:none;letter-spacing:0">(optional — date blank = same day)</small>', '<input id="f-twidate" type="date" value="' + (v.twilight_date ? String(v.twilight_date).slice(0, 10) : '') + '">') +
      fld('f-twitime', 'Twilight time <small style="text-transform:none;letter-spacing:0">(optional)</small>', '<input id="f-twitime" type="time" value="' + esc((v.twilight_time || '').slice(0, 5)) + '">') +
      '<div class="adm-field full"><label>Addons <small style="text-transform:none;letter-spacing:0">(builds the deliverables list)</small></label>' + addonsHtml + '</div>' +
      '<div class="adm-field full"><label for="f-deliverables">Deliverables <small style="text-transform:none;letter-spacing:0">(shown to client — edit freely)</small></label><textarea id="f-deliverables">' + esc(v.deliverables || '') + '</textarea></div>' +
      fld('f-price', 'Price ($)', '<input id="f-price" type="number" min="0" step="1" value="' + (v.price == null ? '' : v.price) + '">') +
      fld('f-status', 'Stage', '<select id="f-status">' + statusOpts + '</select>') +
      fld('f-travel', 'Travel fee ($)', '<input id="f-travel" type="number" min="0" step="1" placeholder="e.g. 150" value="' + (v.travel_fee == null ? '' : v.travel_fee) + '">') +
      fld('f-travelnote', 'Travel fee note', '<input id="f-travelnote" placeholder="e.g. Tahoe trip" value="' + esc(v.travel_note || '') + '">') +
      fld('f-discount', 'Discount code', '<select id="f-discount"><option value="">No discount</option>' +
        state.discounts.filter(function (d) { return d.active || d.code === v.discount_code; }).map(function (d) {
          return '<option value="' + esc(d.code) + '"' + (v.discount_code === d.code ? ' selected' : '') + '>' + esc(discLabel(d)) + '</option>';
        }).join('') + '</select>') +
      fld('f-delivery', 'Delivery link', '<input id="f-delivery" type="url" placeholder="https://…" value="' + esc(v.delivery_url || '') + '">') +
      fld('f-delivered', 'Delivered on', '<input id="f-delivered" type="date" value="' + (v.delivered_at ? String(v.delivered_at).slice(0, 10) : '') + '">') +
      '<div class="adm-field full"><label for="f-notes">Access notes <small style="text-transform:none;letter-spacing:0">(internal — your calendar only)</small></label><textarea id="f-notes" placeholder="Gate codes, staging, access notes…">' + esc(v.notes || '') + '</textarea></div>' +
      '<div class="adm-field full"><label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;font-size:0.85rem;color:var(--ink);cursor:pointer">' +
        '<input type="checkbox" id="f-showprice" style="width:auto"' + (v.show_price === false ? '' : ' checked') + '> Show price in the client\'s booking confirmation</label></div>',
      async function () {
        var body = collectProjectForm(b.id);
        var j = await api('bookings', b.id ? 'PUT' : 'POST', body);
        await reload();
        if (!b.id && j.booking) go('project/' + j.booking.id); else render();
      });

    // addons → deliverables composer
    function checkedList() {
      return Array.prototype.map.call(document.querySelectorAll('.f-addon:checked'), function (x) { return x.value; });
    }
    function regenDeliverables() { $('f-deliverables').value = checkedList().join(' · '); }
    // delegate so custom checkboxes added later also trigger the composer
    $('modal-form').addEventListener('change', function (e) {
      if (e.target.classList && e.target.classList.contains('f-addon')) regenDeliverables();
    });
    function addCustomService() {
      var input = $('f-customsvc');
      var label = input.value.trim().slice(0, 100);
      if (!label) return;
      var exists = Array.prototype.some.call(document.querySelectorAll('.f-addon'), function (x) {
        return x.value.toLowerCase() === label.toLowerCase();
      });
      if (!exists) {
        var wrap = document.createElement('div');
        wrap.innerHTML = addonLabel(label, true);
        $('f-customlist').appendChild(wrap.firstChild);
      }
      input.value = '';
      regenDeliverables();
    }
    $('f-addcustom').addEventListener('click', addCustomService);
    $('f-customsvc').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); addCustomService(); }
    });
    // inline new client: stash the draft, create the client, come back
    $('f-newclient').addEventListener('click', function () {
      var draftNow = collectProjectForm(b.id);
      clientModal(null, function (newClient) {
        bookingModal(b, newClient ? newClient.id : null, draftNow);
      });
    });

    function collectProjectForm(id) {
      return { id: id, title: $('f-title').value, client_id: $('f-client').value,
               city: $('f-city').value, state: $('f-state').value, zip: $('f-zip').value, sqft: $('f-sqft').value,
               shoot_date: $('f-date').value, shoot_time: $('f-time').value, type: $('f-type').value,
               twilight_date: $('f-twidate').value, twilight_time: $('f-twitime').value,
               addons: JSON.stringify(checkedList()), deliverables: $('f-deliverables').value,
               price: $('f-price').value, status: $('f-status').value,
               travel_fee: $('f-travel').value, travel_note: $('f-travelnote').value,
               discount_code: $('f-discount').value,
               delivery_url: $('f-delivery').value, delivered_at: $('f-delivered').value,
               notes: $('f-notes').value, show_price: $('f-showprice').checked };
    }
  }

  async function setStage(id, status) {
    var b = state.bookings.find(function (x) { return x.id == id; });
    if (!b || b.status === status) return;
    var body = Object.assign({}, b, {
      status: status,
      delivered_at: b.delivered_at || (status === 'delivered' ? new Date().toISOString().slice(0, 10) : null)
    });
    await api('bookings', 'PUT', body);
    await reload(); render();
  }

  // ================= views =================
  function head(title, extra, back) {
    return '<div class="adm-head">' +
      (back ? '<span class="adm-back" onclick="history.back()">&larr; Back</span>' : '') +
      '<h1>' + esc(title) + '</h1><span class="grow"></span>' + (extra || '') + '</div>';
  }

  function vDash() {
    var now = new Date();
    var startToday = new Date(now.toDateString());
    var weekEnd = new Date(startToday.getTime() + 7 * 864e5);
    var active = state.bookings.filter(function (b) { return b.status !== 'canceled'; });
    var monthSum = active.filter(function (b) {
      if (!b.shoot_date) return false; var d = new Date(b.shoot_date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).reduce(function (s, b) { return s + net(b); }, 0);
    var yearSum = active.filter(function (b) {
      return b.shoot_date && new Date(b.shoot_date).getFullYear() === now.getFullYear();
    }).reduce(function (s, b) { return s + net(b); }, 0);
    var unpaid = active.filter(function (b) { return b.status !== 'paid'; })
      .reduce(function (s, b) { return s + net(b); }, 0);

    var week = state.bookings.filter(function (b) {
      if (b.status !== 'upcoming' || !b.shoot_date) return false;
      var d = new Date(b.shoot_date); return d >= startToday && d < weekEnd;
    }).sort(function (a, b) { return new Date(a.shoot_date) - new Date(b.shoot_date); });

    var activity = []
      .concat(state.bookings.map(function (b) { return { at: b.created_at, html: 'Project — ' + esc(b.title) + (b.price ? ' · ' + money(b.price) : ''), r: 'project/' + b.id }; }))
      .concat(state.clients.map(function (c) { return { at: c.created_at, html: 'Client — ' + esc(c.name), r: 'client/' + c.id }; }))
      .sort(function (a, b) { return new Date(b.at) - new Date(a.at); }).slice(0, 8);

    var pendingReq = state.requests.filter(function (x) { return x.status === 'pending'; }).length;
    return head('Dashboard', '<button class="adm-btn" onclick="ADM.newBooking()">+ New project</button>') +
      '<div class="adm-stats">' +
        '<div class="adm-stat" style="cursor:pointer" onclick="ADM.go(\'requests\')"><b>' + pendingReq + '</b><span>Pending requests</span></div>' +
        '<div class="adm-stat"><b>' + money(monthSum) + '</b><span>Booked this month</span></div>' +
        '<div class="adm-stat"><b>' + money(yearSum) + '</b><span>Booked this year</span></div>' +
        '<div class="adm-stat"><b>' + money(unpaid) + '</b><span>Awaiting payment</span></div>' +
        '<div class="adm-stat"><b>' + state.clients.length + '</b><span>Clients</span></div>' +
      '</div>' +
      '<div class="adm-cols"><div class="adm-card"><h2>This week</h2>' +
        (week.length ? week.map(function (b) {
          var d = new Date(b.shoot_date);
          return '<div class="adm-day"><div class="adm-day__date"><b>' + d.getDate() + '</b><span>' +
            d.toLocaleDateString(undefined, { weekday: 'short' }) + '</span></div>' +
            '<div class="adm-day__body" onclick="ADM.go(\'project/' + b.id + '\')"><div class="t">' + esc(b.title) +
            (b.shoot_time ? ' · ' + fmtT(b.shoot_time) : '') + '</div><small class="mut">' +
            esc(b.client_name || '') + (b.location ? ' · ' + esc(b.location) : '') + '</small></div>' +
            '<div>' + money(b.price) + '</div></div>';
        }).join('') : '<p class="adm-empty">Nothing scheduled in the next 7 days.</p>') +
      '</div><div class="adm-card"><h2>Recent activity</h2>' +
        (activity.length ? '<ul class="adm-feed">' + activity.map(function (a) {
          return '<li style="cursor:pointer" onclick="ADM.go(\'' + a.r + '\')">' + a.html + '<small>' + dstr(a.at) + '</small></li>';
        }).join('') + '</ul>' : '<p class="adm-empty">Activity will appear as you add clients and projects.</p>') +
      '</div></div>';
  }

  function vRequests() {
    var tabs = ['pending', 'accepted', 'declined', 'all'];
    var list = state.requests.filter(function (r) { return state.reqTab === 'all' || r.status === state.reqTab; });
    var seg = '<span class="adm-seg">' + tabs.map(function (t) {
      return '<button class="' + (state.reqTab === t ? 'on' : '') + '" onclick="ADM.reqTab(\'' + t + '\')">' +
        t.charAt(0).toUpperCase() + t.slice(1) + '</button>';
    }).join('') + '</span>';
    return head('Requests') + '<div class="adm-tools">' + seg + '</div>' +
      '<div class="adm-card">' + (list.length
        ? list.map(function (r) {
            var loc = [r.city, r.state].filter(Boolean).join(', ');
            return '<div style="padding:1.1rem 0;border-bottom:1px solid var(--line-soft)">' +
              '<div style="display:flex;gap:0.8rem;align-items:baseline;flex-wrap:wrap">' +
                '<b style="font-family:var(--serif);font-size:1.05rem;color:var(--navy)">' + esc(r.name) + '</b>' +
                (r.brokerage ? '<small class="mut">' + esc(r.brokerage) + '</small>' : '') +
                '<span class="adm-badge adm-badge--' + esc(r.status) + '">' + esc(r.status) + '</span>' +
                '<span class="grow" style="flex:1"></span><small class="mut">' + dstr(r.created_at) + '</small></div>' +
              '<div style="margin:0.4rem 0 0.2rem;font-size:0.92rem;color:var(--ink)">' + esc(r.title) +
                (loc ? ' · ' + esc(loc) : '') + (r.sqft ? ' · ' + Number(r.sqft).toLocaleString() + ' sqft' : '') +
                (r.target_date ? ' · needed by ' + dstr(r.target_date) : '') + '</div>' +
              (r.services ? '<div style="font-size:0.82rem;color:var(--muted)">' + esc(r.services) + '</div>' : '') +
              (r.message ? '<div class="adm-notes" style="margin-top:0.6rem">' + esc(r.message) + '</div>' : '') +
              '<div style="margin-top:0.7rem;display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center">' +
                '<div style="font-size:0.84rem;color:var(--muted)">' + esc(r.email) + (r.phone ? ' · ' + esc(r.phone) : '') + '</div>' +
                '<span style="flex:1"></span>' +
                (r.status === 'pending'
                  ? '<button class="adm-btn" onclick="ADM.reqAccept(' + r.id + ')">Accept &rarr; project</button>' +
                    '<button class="adm-btn--danger adm-btn" onclick="ADM.reqDecline(' + r.id + ')">Decline</button>'
                  : (r.project_id ? '<button class="adm-btn adm-btn--ghost" onclick="ADM.go(\'project/' + r.project_id + '\')">Open project</button>' : '') +
                    '<button class="adm-btn--danger adm-btn" onclick="ADM.reqDelete(' + r.id + ')">Delete</button>') +
              '</div></div>';
          }).join('')
        : '<p class="adm-empty">No ' + (state.reqTab === 'all' ? '' : state.reqTab + ' ') + 'requests. Applications from jacobcschrader.com/book land here.</p>') +
      '</div>';
  }

  function pipeItems() {
    var q = state.q.toLowerCase();
    return state.bookings.filter(function (b) {
      if (state.clientFilter && String(b.client_id) !== state.clientFilter) return false;
      if (q && (esc(b.title) + ' ' + (b.client_name || '') + ' ' + (b.location || '')).toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }

  function cardlet(b, next) {
    return '<div class="adm-cardlet" draggable="true" data-id="' + b.id + '">' +
      '<b onclick="ADM.go(\'project/' + b.id + '\')">' + esc(b.title) + '</b>' +
      '<small>' + esc(b.client_name || '') + (b.shoot_date ? (b.client_name ? ' · ' : '') + dstr(b.shoot_date) : '') +
      ((b.twilight_date || b.twilight_time) ? ' · twilight' : '') +
      (b.price ? '<br>' + money(b.price) : '') +
      (b.confirmed_at ? '<br><span style="color:#2e5d3a">✓ confirmed</span>' : '') + '</small>' +
      (next ? '<button class="adv" title="Move to ' + STAGE_LABEL[next] + '" onclick="ADM.stage(' + b.id + ',\'' + next + '\')">&rsaquo;</button>' : '') +
    '</div>';
  }

  function vPipeline() {
    var items = pipeItems();
    var toolbar = '<div class="adm-tools">' +
      '<span class="adm-seg">' +
        '<button class="' + (state.view === 'pipeline' ? 'on' : '') + '" onclick="ADM.view(\'pipeline\')">Pipeline</button>' +
        '<button class="' + (state.view === 'board' ? 'on' : '') + '" onclick="ADM.view(\'board\')">Board</button>' +
      '</span>' +
      '<input type="search" id="pipe-q" placeholder="Search projects…" value="' + esc(state.q) + '" oninput="ADM.search(this.value)">' +
      '<select onchange="ADM.clientFilter(this.value)"><option value="">All clients</option>' +
        state.clients.map(function (c) {
          return '<option value="' + c.id + '"' + (state.clientFilter == c.id ? ' selected' : '') + '>' + esc(c.name) + '</option>';
        }).join('') + '</select></div>';

    var body;
    if (state.view === 'board') {
      body = '<div class="adm-pipe" id="pipe">' + STAGES.map(function (stage) {
        var list = items.filter(function (b) { return b.status === stage; })
          .sort(function (x, y) { return new Date(x.shoot_date || 0) - new Date(y.shoot_date || 0); });
        var sum = list.reduce(function (s, b) { return s + (Number(b.price) || 0); }, 0);
        var next = STAGES[STAGES.indexOf(stage) + 1];
        return '<div class="adm-col" data-stage="' + stage + '">' +
          '<div class="adm-col__head"><b>' + STAGE_LABEL[stage] + '</b><span>' + list.length + '</span>' +
          (sum ? '<span class="adm-col__sum">' + money(sum) + '</span>' : '') + '</div>' +
          list.map(function (b) { return cardlet(b, next); }).join('') + '</div>';
      }).join('') + '</div>';
    } else {
      body = '<div id="pipe">' + STAGES.map(function (stage) {
        var list = items.filter(function (b) { return b.status === stage; })
          .sort(function (x, y) { return new Date(x.shoot_date || 0) - new Date(y.shoot_date || 0); });
        var sum = list.reduce(function (s, b) { return s + (Number(b.price) || 0); }, 0);
        var next = STAGES[STAGES.indexOf(stage) + 1];
        var closed = state.collapsed[stage] ? ' closed' : '';
        return '<div class="adm-stage' + closed + '" data-stage="' + stage + '" style="border-left-color:' + STAGE_COLOR[stage] + '">' +
          '<div class="adm-stage__head" onclick="ADM.fold(\'' + stage + '\')">' +
            '<span class="chev">&#9662;</span><b style="color:' + STAGE_COLOR[stage] + '">' + STAGE_LABEL[stage] + '</b>' +
            '<span class="n">' + list.length + ' item' + (list.length === 1 ? '' : 's') + '</span>' +
            (sum ? '<span class="s">' + money(sum) + '</span>' : '<span class="s"></span>') +
          '</div>' +
          '<div class="adm-stage__body">' +
            (list.length ? list.map(function (b) { return cardlet(b, next); }).join('')
                         : '<p class="adm-empty" style="grid-column:1/-1;padding:0.2rem 0">Nothing in ' + STAGE_LABEL[stage].toLowerCase() + '.</p>') +
          '</div></div>';
      }).join('') + '</div>';
    }

    var canceled = state.bookings.filter(function (b) { return b.status === 'canceled'; }).length;
    return head('Projects', '<button class="adm-btn" onclick="ADM.newBooking()">+ New project</button>') +
      toolbar + body +
      (canceled ? '<p class="adm-empty">' + canceled + ' canceled project' + (canceled > 1 ? 's' : '') + ' hidden — find them via client pages.</p>' : '') +
      '<p class="adm-empty">Drag a card between stages, or use the &rsaquo; button to advance it.</p>';
  }

  function wirePipeline() {
    var pipe = $('pipe'); if (!pipe) return;
    var draggedId = null;
    var zone = function (el) { return el.closest ? el.closest('[data-stage]') : null; };
    pipe.addEventListener('dragstart', function (e) {
      var card = e.target.closest('.adm-cardlet'); if (!card) return;
      draggedId = card.dataset.id; card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    pipe.addEventListener('dragend', function (e) {
      var card = e.target.closest('.adm-cardlet'); if (card) card.classList.remove('dragging');
      pipe.querySelectorAll('[data-stage]').forEach(function (c) { c.classList.remove('dragover'); });
    });
    pipe.addEventListener('dragover', function (e) {
      var col = zone(e.target); if (!col) return;
      e.preventDefault();
      pipe.querySelectorAll('[data-stage]').forEach(function (c) { c.classList.toggle('dragover', c === col); });
    });
    pipe.addEventListener('drop', function (e) {
      var col = zone(e.target); if (!col || !draggedId) return;
      e.preventDefault();
      ADM.stage(draggedId, col.dataset.stage);
      draggedId = null;
    });
  }

  function vDeliveries() {
    var delivered = state.bookings.filter(function (b) {
      return ['delivered', 'completed', 'paid'].indexOf(b.status) > -1 || b.delivery_url;
    }).sort(function (a, b) { return new Date(b.delivered_at || b.shoot_date || 0) - new Date(a.delivered_at || a.shoot_date || 0); });
    return head('Deliveries') +
      (delivered.length
        ? '<div class="adm-delgrid">' + delivered.map(function (b) {
            return '<div class="adm-del"><b onclick="ADM.go(\'project/' + b.id + '\')">' + esc(b.title) + '</b>' +
              '<small>' + esc(b.client_name || '—') + (b.delivered_at ? '<br>Delivered ' + dstr(b.delivered_at) : '') +
              '<br><span class="adm-badge adm-badge--' + esc(b.status) + '">' + esc(b.status) + '</span></small>' +
              (b.delivery_url
                ? '<a class="lnk" href="' + esc(b.delivery_url) + '" target="_blank" rel="noopener">Open delivery &rarr;</a>'
                : '<span class="nolnk">No delivery link yet — add one via Edit.</span>') +
            '</div>';
          }).join('') + '</div>'
        : '<div class="adm-card"><p class="adm-empty">Nothing delivered yet — projects appear here once they reach the Delivered stage.</p></div>');
  }

  function vPortfolio() {
    var projects = (window.PROJECTS_DATA || []);
    return head('Portfolio') +
      '<div class="adm-projgrid">' + projects.map(function (p) {
        var url = p.draft ? '/project?slug=' + encodeURIComponent(p.slug) : '/project/' + p.slug;
        return '<a class="adm-proj" href="' + url + '" target="_blank"><div class="ph-wrap">' +
          (p.cover_url ? '<img src="' + esc(p.cover_url) + '" loading="lazy" alt="">' : '') + '</div>' +
          '<div class="cap"><b>' + esc(p.title) + '</b>' +
          '<span class="adm-badge adm-badge--' + (p.draft ? 'draft">Draft' : 'live">Live') + '</span> ' +
          '<small class="mut">' + esc(p.location || '') + '</small></div></a>';
      }).join('') + '</div>' +
      '<p class="adm-empty" style="margin-top:1.4rem">These are the published website projects. To add or edit one, stage the media and ask Claude in the JCS-Website session.</p>';
  }

  function vSettings() {
    var list = state.discounts;
    return head('Settings') +
      '<div class="adm-card"><h2>Discount codes</h2>' +
      '<form class="adm-form" onsubmit="ADM.discCreate(event)" style="margin-bottom:1.4rem">' +
        fld('d-code', 'Code *', '<input id="d-code" required placeholder="SPRING10" style="text-transform:uppercase">') +
        fld('d-kind', 'Type', '<select id="d-kind"><option value="percent">Percent off</option><option value="amount">Dollar amount off</option></select>') +
        fld('d-value', 'Value *', '<input id="d-value" type="number" min="1" step="0.01" required placeholder="10">') +
        fld('d-note', 'Note', '<input id="d-note" placeholder="e.g. Returning client">') +
        '<div class="full"><button class="adm-btn" type="submit">Create code</button></div>' +
      '</form>' +
      (list.length
        ? '<table class="adm-table"><tr><th>Code</th><th>Discount</th><th class="hide-m">Note</th><th>Status</th><th></th></tr>' +
          list.map(function (d) {
            return '<tr><td style="letter-spacing:0.08em;font-weight:600">' + esc(d.code) + '</td>' +
              '<td>' + (d.kind === 'percent' ? Number(d.value) + '%' : '$' + Number(d.value).toLocaleString()) + '</td>' +
              '<td class="hide-m">' + esc(d.note || '—') + '</td>' +
              '<td><span class="adm-badge adm-badge--' + (d.active ? 'live">Active' : 'canceled">Inactive') + '</span></td>' +
              '<td class="adm-row-act" style="white-space:nowrap">' +
                '<button style="background:none;border:0;cursor:pointer;font-size:0.75rem;color:var(--navy);text-decoration:underline;text-underline-offset:3px;padding:0 0.4rem" onclick="ADM.discToggle(' + d.id + ')">' + (d.active ? 'Deactivate' : 'Activate') + '</button>' +
                '<button style="background:none;border:0;cursor:pointer;font-size:0.75rem;color:#a33;text-decoration:underline;text-underline-offset:3px;padding:0 0.4rem" onclick="ADM.discDelete(' + d.id + ')">Delete</button>' +
              '</td></tr>';
          }).join('') + '</table>'
        : '<p class="adm-empty">No discount codes yet.</p>') +
      '<p class="adm-msg" style="color:var(--muted)">Applying a code to a project locks in the dollar amount at save time — editing a code later never changes existing projects.</p>' +
      '</div>';
  }

  function vClients() {
    return head('Clients', '<button class="adm-btn" onclick="ADM.newClient()">+ New client</button>') +
      '<div class="adm-card">' + (state.clients.length
        ? '<table class="adm-table"><tr><th>Name</th><th class="hide-m">Brokerage</th><th>Contact</th><th class="hide-m">Projects</th></tr>' +
          state.clients.map(function (c) {
            return '<tr class="click" onclick="ADM.go(\'client/' + c.id + '\')"><td>' + esc(c.name) + '</td><td class="hide-m">' +
              esc(c.brokerage || '—') + '</td><td>' + esc(c.email || c.phone || '—') + '</td><td class="hide-m">' + (c.booking_count || 0) + '</td></tr>';
          }).join('') + '</table>'
        : '<p class="adm-empty">No clients yet.</p>') + '</div>';
  }

  function vClientDetail(id) {
    var c = state.clients.find(function (x) { return x.id == id; });
    if (!c) return head('Client not found', '', true);
    var theirs = state.bookings.filter(function (b) { return b.client_id == c.id; });
    var total = theirs.filter(function (b) { return b.status !== 'canceled'; })
      .reduce(function (s, b) { return s + (Number(b.price) || 0); }, 0);
    return head(c.name,
        '<button class="adm-btn adm-btn--ghost" onclick="ADM.editClient(' + c.id + ')">Edit</button>' +
        '<button class="adm-btn--danger adm-btn" onclick="ADM.delClient(' + c.id + ')">Delete</button>', true) +
      '<div class="adm-card"><div class="adm-detail">' +
        '<div class="adm-kv"><label>Email</label><div>' + (c.email ? '<a href="mailto:' + esc(c.email) + '">' + esc(c.email) + '</a>' : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Phone</label><div>' + (c.phone ? '<a href="tel:' + esc(c.phone) + '">' + esc(c.phone) + '</a>' : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Brokerage</label><div>' + esc(c.brokerage || '—') + '</div></div>' +
        '<div class="adm-kv"><label>Lifetime booked</label><div>' + money(total) + '</div></div>' +
      '</div>' + (c.notes ? '<div class="adm-notes">' + esc(c.notes) + '</div>' : '') + '</div>' +
      '<div class="adm-card"><h2>Projects</h2>' + (theirs.length
        ? '<table class="adm-table"><tr><th>Date</th><th>Property</th><th>Price</th><th>Stage</th></tr>' +
          theirs.map(function (b) {
            return '<tr class="click" onclick="ADM.go(\'project/' + b.id + '\')"><td>' + dstr(b.shoot_date) + '</td><td>' + esc(b.title) +
              '</td><td>' + money(b.price) + '</td><td><span class="adm-badge adm-badge--' + esc(b.status) + '">' + esc(b.status) + '</span></td></tr>';
          }).join('') + '</table>'
        : '<p class="adm-empty">No projects for this client yet.</p>') +
      '<div style="margin-top:1rem"><button class="adm-btn" onclick="ADM.newBooking(' + c.id + ')">+ New project for ' + esc(c.name) + '</button></div></div>';
  }

  function vBookingDetail(id) {
    var b = state.bookings.find(function (x) { return x.id == id; });
    if (!b) return head('Project not found', '', true);
    var next = STAGES[STAGES.indexOf(b.status) + 1];
    return head(b.title,
        '<button class="adm-btn" onclick="ADM.confirm(' + b.id + ')">' + (b.confirmed_at ? 'Resend confirmation' : 'Confirm &amp; send') + '</button>' +
        (next ? '<button class="adm-btn adm-btn--ghost" onclick="ADM.stage(' + b.id + ',\'' + next + '\')">Move to ' + STAGE_LABEL[next] + ' &rsaquo;</button>' : '') +
        '<button class="adm-btn adm-btn--ghost" onclick="ADM.editBooking(' + b.id + ')">Edit</button>' +
        '<button class="adm-btn--danger adm-btn" onclick="ADM.delBooking(' + b.id + ')">Delete</button>', true) +
      '<div class="adm-card"><div class="adm-detail">' +
        '<div class="adm-kv"><label>Stage</label><div><span class="adm-badge adm-badge--' + esc(b.status) + '">' + esc(b.status) + '</span></div></div>' +
        '<div class="adm-kv"><label>Shoot</label><div>' + dstr(b.shoot_date) + (b.shoot_time ? ' · ' + fmtT(b.shoot_time) : '') + '</div></div>' +
        '<div class="adm-kv"><label>Twilight</label><div>' + ((b.twilight_date || b.twilight_time) ? (dstr(b.twilight_date || b.shoot_date) + (b.twilight_time ? ' · ' + fmtT(b.twilight_time) : '')) : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Confirmed</label><div>' + (b.confirmed_at ? '✓ ' + dstr(b.confirmed_at) : 'Not yet — use Confirm &amp; send') + '</div></div>' +
        '<div class="adm-kv"><label>Client</label><div>' + (b.client_id ? '<a style="cursor:pointer" onclick="ADM.go(\'client/' + b.client_id + '\')">' + esc(b.client_name || '') + '</a>' : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Location</label><div>' + esc(b.location || '—') + '</div></div>' +
        '<div class="adm-kv"><label>Type</label><div>' + esc(b.type || '—') + '</div></div>' +
        '<div class="adm-kv"><label>Sqft</label><div>' + (b.sqft ? Number(b.sqft).toLocaleString() : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Price</label><div>' + money(b.price) + (b.travel_fee ? ' <small class="mut">+ ' + money(b.travel_fee) + ' travel' + (b.travel_note ? ' (' + esc(b.travel_note) + ')' : '') + '</small>' : '') + '</div></div>' +
        '<div class="adm-kv"><label>Discount</label><div>' + (b.discount_value ? '&minus;' + money(b.discount_value) + ' <small class="mut">(' + esc(b.discount_code || '') + ')</small>' : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Total</label><div>' + (b.price ? money(net(b) + (Number(b.travel_fee) || 0)) : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Delivered</label><div>' + (b.delivered_at ? dstr(b.delivered_at) : '—') + '</div></div>' +
        '<div class="adm-kv"><label>Delivery link</label><div>' + (b.delivery_url ? '<a href="' + esc(b.delivery_url) + '" target="_blank" rel="noopener">Open &rarr;</a>' : '—') + '</div></div>' +
      '</div>' +
      (b.deliverables ? '<div class="adm-notes"><b style="font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600">Deliverables</b><br>' + esc(b.deliverables) + '</div>' : '') +
      (b.notes ? '<div class="adm-notes"><b style="font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:600">Access notes</b><br>' + esc(b.notes) + '</div>' : '') + '</div>';
  }

  // ================= render =================
  function render() {
    var r = route(), m = $('main');
    var section = r.split('/')[0];
    var owns = { dash:'dash', requests:'requests', pipeline:'pipeline', project:'pipeline', deliveries:'deliveries',
                 clients:'clients', client:'clients', portfolio:'portfolio', settings:'settings' }[section] || 'dash';
    document.querySelectorAll('#nav a').forEach(function (a) { a.classList.toggle('on', a.dataset.r === owns); });
    if (section === 'requests') m.innerHTML = vRequests();
    else if (section === 'pipeline') { m.innerHTML = vPipeline(); wirePipeline(); }
    else if (section === 'project') m.innerHTML = vBookingDetail(r.split('/')[1]);
    else if (section === 'deliveries') m.innerHTML = vDeliveries();
    else if (section === 'clients') m.innerHTML = vClients();
    else if (section === 'client') m.innerHTML = vClientDetail(r.split('/')[1]);
    else if (section === 'portfolio') m.innerHTML = vPortfolio();
    else if (section === 'settings') m.innerHTML = vSettings();
    else m.innerHTML = vDash();
  }

  $('nav').addEventListener('click', function (e) {
    var a = e.target.closest('a'); if (a) go(a.dataset.r);
  });

  // exposed for inline handlers
  window.ADM = {
    go: go,
    confirm: async function (id) {
      var b = state.bookings.find(function (x) { return x.id == id; }); if (!b) return;
      if (!b.shoot_date) { alert('Set a shoot date first (Edit).'); return; }
      var who = b.client_name ? b.client_name : 'no client linked';
      if (!confirm('Send booking confirmation with calendar invite?\n\nClient: ' + who + '\nA copy also goes to you.')) return;
      try {
        var j = await api('confirm', 'POST', { id: id });
        await reload(); render();
        var msg = j.clientSent ? 'Confirmation sent to client and you.' : 'Confirmed. No client email on file, so only you received it.';
        msg += j.calendarWritten ? ' Added to your Google Calendar.' : ' Calendar invite attached to the emails.';
        alert(msg);
      } catch (e) { alert(friendly(e)); }
    },
    view: function (v) { state.view = v; localStorage.setItem('adm-view', v); render(); },
    fold: function (s) { state.collapsed[s] = !state.collapsed[s]; render(); },
    search: function (q) {
      state.q = q; render();
      var el = $('pipe-q'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    },
    clientFilter: function (v) { state.clientFilter = v; render(); },
    stage: function (id, s) { setStage(id, s).catch(function (e) { alert(friendly(e)); }); },
    reqTab: function (t) { state.reqTab = t; render(); },
    discCreate: async function (e) {
      e.preventDefault();
      try {
        await api('discounts', 'POST', { code: $('d-code').value, kind: $('d-kind').value, value: $('d-value').value, note: $('d-note').value });
        await reload(); render();
      } catch (err) { alert(String(err.message) === 'duplicate-code' ? 'That code already exists.' : friendly(err)); }
    },
    discToggle: async function (id) {
      var d = state.discounts.find(function (x) { return x.id == id; }); if (!d) return;
      try { await api('discounts', 'PUT', { id: d.id, code: d.code, kind: d.kind, value: d.value, note: d.note, active: !d.active }); await reload(); render(); }
      catch (e) { alert(friendly(e)); }
    },
    discDelete: async function (id) {
      if (!confirm('Delete this code? Projects that already used it keep their locked-in discount.')) return;
      try { await api('discounts', 'DELETE', { id: id }); await reload(); render(); }
      catch (e) { alert(friendly(e)); }
    },
    reqAccept: async function (id) {
      if (!confirm('Accept this request? A client + project are created (no email is sent yet — you set the quote, then Confirm & send).')) return;
      try {
        var j = await api('requests', 'POST', { id: id, action: 'accept' });
        await reload(); go('project/' + j.projectId);
      } catch (e) { alert(friendly(e)); }
    },
    reqDecline: async function (id) {
      if (!confirm('Decline this request? A graceful decline email goes to the applicant.')) return;
      try { await api('requests', 'POST', { id: id, action: 'decline' }); await reload(); render(); }
      catch (e) { alert(friendly(e)); }
    },
    reqDelete: async function (id) {
      if (!confirm('Delete this request permanently?')) return;
      try { await api('requests', 'DELETE', { id: id }); await reload(); render(); }
      catch (e) { alert(friendly(e)); }
    },
    newClient: function () { clientModal(); },
    editClient: function (id) { clientModal(state.clients.find(function (c) { return c.id == id; })); },
    delClient: async function (id) {
      if (!confirm('Delete this client? Their projects are kept (unlinked).')) return;
      try { await api('clients', 'DELETE', { id: id }); await reload(); go('clients'); render(); } catch (e) { alert(friendly(e)); }
    },
    newBooking: function (clientId) { bookingModal(null, clientId); },
    editBooking: function (id) { bookingModal(state.bookings.find(function (b) { return b.id == id; })); },
    delBooking: async function (id) {
      if (!confirm('Delete this project?')) return;
      try { await api('bookings', 'DELETE', { id: id }); await reload(); go('pipeline'); render(); } catch (e) { alert(friendly(e)); }
    }
  };

  // boot
  fetch('/api/admin/me').then(function (r) { r.ok ? showApp() : showLogin(); }).catch(showLogin);
})();
</script>
</body>
</html>
